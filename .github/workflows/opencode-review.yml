name: opencode-review

on:
  pull_request:
    branches: [main]
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    if: |
      github.event_name == 'pull_request' && !github.event.pull_request.draft ||
      startsWith(github.event.comment.body, '/review') ||
      contains(github.event.comment.body, '/review')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          persist-credentials: false
          fetch-depth: 0

      # Comment-triggered runs start on the default branch; switch to PR head
      # so opencode reads the PR's code.
      - if: github.event_name == 'issue_comment'
        run: gh pr checkout "${{ github.event.issue.number }}" --repo "$GITHUB_REPOSITORY"

      - uses: Barmore-Genc/opencode-pr-reviewer@v1
        with:
          model: opencode/deepseek-v4-flash-free
          pr-number: ${{ github.event.pull_request.number || github.event.issue.number }}
          user-comment: ${{ github.event.comment.body }}
