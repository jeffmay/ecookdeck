name: CI

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - ".github/workflows/*"
      - "**/eslint*"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.css"
      - "**/*.html"
      - "**/*.json"

permissions:
  contents: write
  pull-requests: write
  deployments: write
  statuses: write

jobs:
  test-and-lint:
    name: Test and Lint
    uses: ./.github/workflows/test-and-lint.yml

  deploy-web-preview:
    name: Web
    needs:
      - test-and-lint
    runs-on: ubuntu-latest
    outputs:
      deployed: ${{ steps.check-web-code.outputs.changed }}
      web_url: ${{ steps.deploy-web-preview.outputs.deploy-url || 'https://ecookbook.netlify.app' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for Web App changes
        id: check-web-code
        run: |
          echo "Checking for Web App changes..."
          git fetch origin main
          if git diff --name-only origin/main...HEAD | grep -E '^packages/(shared|web)/' | grep -v '.*\.test\.tsx?'; then
            echo "Web App changes detected."
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No Web App changes detected."
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build the app
        if: steps.check-web-code.outputs.changed == 'true'
        run: npm ci --workspace=packages/web && npm run build --workspace=packages/web

      - name: Deploy to Netlify
        if: steps.check-web-code.outputs.changed == 'true'
        id: deploy-web-preview
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: "./packages/web/dist"
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: ${{ github.event.pull_request.title }}
          enable-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_API_TOKEN_DEPLOY_PROD }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PROJECT_ID_PROD }}
        timeout-minutes: 1

      - name: Deployment comment for preview Web App only
        if: steps.check-web-code.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { GITHUB_SHA } = process.env
            const VERSION = GITHUB_SHA.substring(0, 7)
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 The [Preview Web App](${{ steps.deploy-web-preview.outputs.deploy-url }}) was successfully deployed for ${VERSION}! No Server changes detected.`
            })

      - name: No deployment comment
        if: steps.check-web-code.outputs.changed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { GITHUB_SHA } = process.env
            const VERSION = GITHUB_SHA.substring(0, 7)
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Skipped deployment of ${VERSION}. No Web App or Server changes detected.`
            })

      - name: Failure comment
        if: failure()
        uses: actions/github-script@v7
        env:
          BUILD_LOGS: ${{ steps.deploy-web-preview.outputs.build_logs }}
          DEPLOY_LOGS: ${{ steps.deploy-web-preview.outputs.deploy_logs }}
        with:
          script: |
            const { BUILD_LOGS, DEPLOY_LOGS, GITHUB_SHA } = process.env
            const VERSION = GITHUB_SHA.substring(0, 7)
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `The App failed to deploy for ${VERSION}. Logs can be found [here](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).
              ## Logs
              <details>
              <summary>Build logs</summary> [2]
              \`\\
              ${BUILD_LOGS}
              \`\\
              </details>
              <details>
              <summary>Deploy logs</summary> [3]
              \`\\
              ${DEPLOY_LOGS}
              \`\\
              </details>`
            })
